name: nih
batch_size: 16
num_classes: 14
channels: 3
image_size: 224
input_dim: 150528
num_workers: 4
pin_memory: true
train_subset: null
test_subset: null

data_root: ${data.root}//work3/sarste/NIH
images_dir: ${dataset.data_root}/images
metadata_csv: ${dataset.data_root}/Data_Entry_2017.csv

multilabel: true

# NIH-specific column names
image_id_col: Image Index
patient_id_col: Patient ID
sex_col: Patient Gender
age_col: Patient Age
frontal_lateral_col: null
frontal_lateral: null

all_classes: [
    "Atelectasis",
    "Consolidation",
    "Infiltration",
    "Pneumothorax",
    "Edema",
    "Emphysema",
    "Fibrosis",
    "Effusion",
    "Pneumonia",
    "Pleural_Thickening",
    "Cardiomegaly",
    "Nodule",
    "Mass",
    "Hernia",
]

pseudo_rgb: false
crop: null
blur: null
chosen_disease: null
num_per_patient: 1

# Population division: by_gender, by_age, by_disease_count
population_division: by_gender
alternate_population_division: null
# Restrict train/val to specific subgroup values (null = all subgroups).
# E.g. ["F"] trains only on females; test always keeps all subgroups.
train_subgroups: null

age_lower: 40
age_upper: 60

disease_count_threshold: 1

# Train/val/test split ratios (patient-level)
train_ratio: 0.6
val_ratio: 0.2
test_ratio: 0.2
