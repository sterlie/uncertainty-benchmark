name: chexpert
batch_size: 16
num_classes: 12
channels: 3
image_size: 224
input_dim: 150528
num_workers: 0
pin_memory: false
train_subset: null
test_subset: null

data_root: ${data.root}/chexpert
images_dir: ${dataset.data_root}/valid
metadata_csv: ${dataset.data_root}/valid.csv

frontal_lateral: Frontal
all_classes: [
    "Enlarged Cardiomediastinum",
    "Cardiomegaly",
    "Lung Opacity",
    "Lung Lesion",
    "Edema",
    "Consolidation",
    "Pneumonia",
    "Atelectasis",
    "Pneumothorax",
    "Pleural Effusion",
    "Pleural Other",
    "Fracture",
]

multilabel: true
image_id_col: Path
patient_id_col: null
sex_col: Sex
age_col: Age
frontal_lateral_col: Frontal/Lateral
pseudo_rgb: false
crop: null
blur: null
chosen_disease: null
num_per_patient: 1

# Population division: by_gender, by_age, by_disease_count
population_division: by_gender
alternate_population_division: null
# Restrict train/val to specific subgroup values (null = all subgroups).
# E.g. ["Female"] trains only on females; test always keeps all subgroups.
train_subgroups: null

age_lower: 50
age_upper: 70

disease_count_threshold: 1

# Train/val/test split ratios (patient-level)
train_ratio: 0.6
val_ratio: 0.2
test_ratio: 0.2

